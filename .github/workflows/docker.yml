name: Docker

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  docker-build:
    name: Build & test Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: agtech-irrigation:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Health check — pipeline imports cleanly
        run: |
          docker run --rm agtech-irrigation:ci \
            python -c "
          from src.pipeline.fusion import process_precision_irrigation
          from src.data.synthetic import generate_synthetic_arrays
          rgb, th = generate_synthetic_arrays()
          _, _, n_stress, n_ok = process_precision_irrigation(rgb, th, 30.0)
          assert n_stress == 5 and n_ok == 5
          print('Docker smoke test PASSED — stress=%d, ok=%d' % (n_stress, n_ok))
          "

  docker-publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: docker-build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
